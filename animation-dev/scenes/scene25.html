<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>第 25 幕：只要給予足夠的時...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene25.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">只要給予足夠的時間，</p>

      </div>
      <div class="visual-side fade-in delay-2s">
        <div class="image-wrapper">
          <img src="../assets/ai_mentor.png" class="scene-img ai-img" alt="AI耐心的陪伴指導">
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5500);
  </script>
</body>
</html>
