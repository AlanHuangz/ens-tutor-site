<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>第一幕 - 願意學</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene1.css">
  <!-- 引入 Google Fonts 中文字型 -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="brand-wrapper">
      <!-- 標題淡入 -->
      <h1 class="brand-title fade-in-up">願意學</h1>
      
      <!-- 裝飾分隔線，隨延遲展開 -->
      <div class="divider"></div>
      
      <!-- 副標題淡入 -->
      <p class="brand-subtitle fade-in-up delay-1s">先懂孩子，再懂數學</p>
      
      <!-- 額外補充標籤，更晚淡入 -->
      <span class="brand-badge fade-in delay-2s">AI 時代的自學教練</span>
    </div>
  </div>

  <script>
    // 動畫結束後（例如 5 秒）主動通知播放器切換至下一幕
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5000);
  </script>
</body>
</html>
