<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 1 幕：你是否也常聽人說...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene1.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">你是否也常聽人說：</p>
        <p class="animate-line fade-in-up delay-1s">「現在的孩子，<span class="highlight">一代不如一代</span>」？</p>
      </div>
      <div class="visual-side fade-in delay-2s">
        <div class="image-wrapper">
          <img src="../assets/parent_anxiety.png" class="scene-img anxiety-img" alt="家長懊惱與焦慮">
          <div class="bubble bubble-1">？</div>
          <div class="bubble bubble-2">？</div>
          <div class="bubble bubble-3">…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5500);
  </script>
</body>
</html>
