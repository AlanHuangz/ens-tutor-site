<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>第 16 幕：第一是自主感  ...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene16.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">第一是<span class="highlight">「自主感」</span>：</p>
        <p class="animate-line fade-in-up delay-1s">我想怎麼學習，是我自己可以決定的。</p>
      </div>
      <div class="visual-side fade-in delay-2s">
        <div class="image-wrapper">
          <img src="../assets/autonomy.png" class="scene-img autonomy-img" alt="自主感">
        </div>
        <div id="back-to-menu-container" style="display: none; position: absolute; bottom: 2vw; right: 2vw; z-index: 100;">
          <button class="back-btn" onclick="backToMenu()">返回選單 ↩</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function backToMenu() {
      window.parent.postMessage({ type: 'GO_TO_SCENE', index: 14 }, '*'); // 跳回 scene15 (index 14)
    }

    // 檢查是否是互動模式
    const isInteractive = sessionStorage.getItem('is_interactive_mode') === 'true';

    if (isInteractive) {
      // 顯示返回按鈕，不自動跳下一幕
      document.getElementById('back-to-menu-container').style.display = 'block';
    } else {
      // 自動播放模式：時間到自動跳下一幕
      setTimeout(() => {
        window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
      }, 5500);
    }
  </script>
</body>
</html>
