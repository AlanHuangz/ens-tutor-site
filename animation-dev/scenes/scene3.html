<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 3 幕：我相信每個時代的...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">我相信，每個時代的孩子，</p>
        <p class="animate-line fade-in-up delay-1s">都有屬於他們...</p>
        <p class="animate-line fade-in-up delay-2s">最正確的開啟方式。</p>
      </div>
      <div class="visual-side fade-in delay-2s">
        <div class="stars-container">
          <div class="star star-1">✦</div>
          <div class="star star-2">✦</div>
          <div class="star star-3">✦</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 7000);
  </script>
</body>
</html>
