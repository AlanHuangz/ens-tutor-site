<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 13 幕：只是要同時顧進度...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css?v=1.2">
  <link rel="stylesheet" href="scene13.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">只是要同時顧進度、考試、秩序和情緒...</p>
      </div>
      <div class="visual-side fade-in delay-1s">
        <div class="juggling-container">
          <div class="juggling-ball ball-a">進度</div>
          <div class="juggling-ball ball-b">班級</div>
          <div class="juggling-ball ball-c">考試</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 4000);
  </script>
</body>
</html>
