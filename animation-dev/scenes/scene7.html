<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 7 幕：當科技快速前進 ...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene7.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">當科技快速前進，</p>
        <p class="animate-line fade-in-up delay-1s">我們的授課方式，卻還<span class="highlight">停留在原地</span>。</p>
      </div>
      <div class="visual-side fade-in delay-2s">
        <div class="track-wrapper">
          <div class="track-line track-top">
            <div class="moving-light"></div>
            <span class="track-label">科技</span>
          </div>
          <div class="track-line track-bottom">
            <div class="static-dot"></div>
            <span class="track-label">教育</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5500);
  </script>
</body>
</html>
