<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 5 幕：那時候的教育  ...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css?v=1.2">
  <link rel="stylesheet" href="scene5.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">那時候的教育，</p>
        <p class="animate-line fade-in-up delay-1s">追求的是：<span class="highlight">穩定、標準、效率與同步</span>。</p>
      </div>
      <div class="visual-side fade-in delay-1s">
        <div class="conveyor-container">
          <div class="conveyor-belt">
            <div class="conveyor-roller roller-1">⚙️</div>
            <div class="conveyor-roller roller-2">⚙️</div>
            <div class="conveyor-roller roller-3">⚙️</div>
          </div>
          <div class="box-container">
            <div class="conveyor-box box-1">📦</div>
            <div class="conveyor-box box-2">📦</div>
            <div class="conveyor-box box-3">📦</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5500);
  </script>
</body>
</html>
