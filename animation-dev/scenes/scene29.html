<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 29 幕：這時孩子最需要的...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene29.css">

</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">這時，孩子最需要的<span class="highlight">「歸屬感」</span>，</p>
        <p class="animate-line fade-in-up delay-1s">就悄悄地建立起來了。</p>

        <div class="haven-container">
          <div class="haven-house">🏡</div>
          <div class="haven-smoke">💨</div>
          <div class="haven-heart haven-heart-1">🧡</div>
          <div class="haven-heart haven-heart-2">✨</div>
          <div class="haven-heart haven-heart-3">💖</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5500);
  </script>

</html>
