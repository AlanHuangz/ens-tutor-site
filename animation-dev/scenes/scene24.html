<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>第 24 幕：隨時想問就問沒有...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene24.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up"><span class="highlight">隨時想問就問</span>，沒有任何心理負擔。</p>
      </div>
      <div class="visual-side fade-in delay-1s">
        <div class="chat-box-wrapper">
          <div class="chat-bubble bubble-left">我這個部分還是不懂...</div>
          <div class="chat-bubble bubble-right">
            <span class="typing-dots" id="dots-anim">沒問題，我們再換個方式說一遍！💡</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 4000);
  </script>
</body>
</html>
