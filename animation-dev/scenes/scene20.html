<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 20 幕：更多選擇</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css?v=1.8">
  <link rel="stylesheet" href="scene20.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="story-layout">
      <div class="story-copy">
        <p class="animate-line fade-in-up" style="font-size: 22px !important;">不管是圖像、影像</p>
        <p class="animate-line fade-in-up delay-500ms" style="font-size: 22px !important; color: #5B6D8D !important;">還是聽覺的輸入</p>
        <p class="animate-line fade-in-up delay-1s" style="font-size: 18px !important;">學習開始有了</p>
        <p class="animate-line fade-in-up delay-1500ms emph-line" style="font-size: 30px !important; color: #FFAF65 !important;">更多選擇</p>
      </div>
      <div class="story-visual fade-in delay-500ms" aria-hidden="true">
        <div class="photo-stage photo-scene-20">
          <span class="photo-light l1"></span>
          <span class="photo-light l2"></span>
          <img src="../assets/scene20-illustration.png" class="scene-img photo-img" alt="孩子用圖像影像聽覺選擇適合自己的入口">
          <span class="photo-thread"></span>
        </div>
      </div>
    </div>
    <div class="brand-signature"><img src="../assets/slogan_child_math.png" class="sig-first" alt="先懂孩子，再懂數學"><img src="../assets/slogan_ai_coach.png" class="sig-second" alt="AI時代的自學教練"></div>

  </div>

  <script>
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5160);
    if (new URLSearchParams(window.location.search).get('qa') === 'still') {
      document.body.classList.add('qa-still');
    }
  </script>
</body>
</html>
