<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第 23 幕：孩子再也不用擔心...</title>
  <link rel="stylesheet" href="../shared/reset.css">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="scene23.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap">
</head>
<body>
  <div class="scene-container">
    <div class="scene-split-container">
      <div class="text-side">
        <p class="animate-line fade-in-up">孩子再也不用擔心，</p>
        <p class="animate-line fade-in-up delay-1s">面對別人的不耐煩。</p>
      </div>
      <div class="visual-side fade-in delay-2s">
        <div class="running-track">
          <div class="runner runner-fast-1"></div>
          <div class="runner runner-fast-2"></div>
          <div class="runner runner-slow"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 動畫播放完畢後主動通知播放器切換
    setTimeout(() => {
      window.parent.postMessage({ type: 'SCENE_COMPLETE' }, '*');
    }, 5500);
  </script>
</body>
</html>
