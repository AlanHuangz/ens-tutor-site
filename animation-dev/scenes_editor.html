<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>願意學 - 故事簡報幕數編輯器</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap">
  <style>
    :root {
      --color-text-main: #001B45;
      --color-primary: #10295F;
      --color-secondary: #001B45;
      --color-accent: #FFB84D;
      --color-coral: #FFAF65;
      --color-bg: #F4F8F8;
      --color-card-bg: rgba(255, 255, 255, 0.85);
      --color-glass-border: rgba(16, 41, 95, 0.1);
      --font-brand: "Noto Sans TC", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-brand);
      background-color: var(--color-bg);
      color: var(--color-text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--color-primary), #1a3c7d);
      color: white;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      height: 36px;
      filter: brightness(0) invert(1);
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .actions-top {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(7, 27, 70, 0.08);
    }

    .btn-primary {
      background-color: var(--color-accent);
      color: var(--color-primary);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 184, 77, 0.35);
      background-color: #ffa826;
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .btn-danger {
      background-color: var(--color-coral);
      color: white;
    }

    .btn-danger:hover {
      background-color: #ff5247;
      transform: translateY(-2px);
    }

    /* Main Container */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar - Scenes List */
    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid var(--color-glass-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-title {
      padding: 18px;
      font-weight: 900;
      font-size: 16px;
      border-bottom: 1px solid var(--color-glass-border);
      background: rgba(16, 41, 95, 0.02);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .scenes-list {
      list-style: none;
    }

    .scene-item {
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 1px solid rgba(16, 41, 95, 0.04);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s ease;
    }

    .scene-item:hover {
      background-color: rgba(16, 41, 95, 0.03);
    }

    .scene-item.active {
      background-color: rgba(16, 41, 95, 0.06);
      border-left: 5px solid var(--color-primary);
      font-weight: 700;
    }

    .scene-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background-color: rgba(16, 41, 95, 0.08);
      display: inline-grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      color: var(--color-primary);
      flex-shrink: 0;
    }

    .scene-item.active .scene-num {
      background-color: var(--color-primary);
      color: white;
    }

    .scene-label {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--color-text-main);
    }

    /* Editor Workspace - Left side of split */
    .workspace {
      flex: 1.1;
      background: var(--color-bg);
      padding: 32px;
      overflow-y: auto;
      border-right: 1px solid var(--color-glass-border);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .workspace-section {
      background: var(--color-card-bg);
      border: 1px solid var(--color-glass-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(7, 27, 70, 0.02);
      backdrop-filter: blur(8px);
    }

    .section-title {
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--color-primary);
      border-bottom: 2px solid rgba(16, 41, 95, 0.05);
      padding-bottom: 8px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: rgba(7, 27, 70, 0.75);
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--color-glass-border);
      font-family: var(--font-brand);
      font-size: 14px;
      background: white;
      color: var(--color-text-main);
      transition: all 0.3s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(16, 41, 95, 0.1);
    }

    .lines-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .line-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--color-glass-border);
      background: white;
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background-color: var(--color-bg);
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .btn-icon.remove:hover {
      background-color: #ffebeb;
      border-color: var(--color-coral);
      color: var(--color-coral);
    }

    /* Live Preview - Right side of split */
    .preview-panel {
      flex: 0.9;
      background: #e2ecec;
      padding: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .preview-header {
      position: absolute;
      top: 24px;
      left: 32px;
      right: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .preview-title {
      font-size: 14px;
      font-weight: 800;
      color: rgba(7, 27, 70, 0.45);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .slide-wrapper {
      width: 100%;
      max-width: 680px;
      aspect-ratio: 16 / 9;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(7, 27, 70, 0.12);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(16, 41, 95, 0.08);
      display: flex;
      flex-direction: column;
    }

    /* Replicating Presentation Layout */
    .slide-container {
      width: 100%;
      height: 100%;
      padding: 6% 8%;
      box-sizing: border-box;
      background:
        linear-gradient(90deg, rgba(16, 41, 95, 0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(7, 27, 70, 0.035) 1px, transparent 1px),
        #FFFFFF;
      background-size: 5% 9%, 5% 9%, auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-container::before {
      content: "";
      position: absolute;
      top: 5%;
      left: 5%;
      width: 18%;
      height: 12%;
      background: url("assets/logo.png") left center / contain no-repeat;
      z-index: 8;
    }

    .slide-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 6%;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .slide-layout.final-logo-layout {
      grid-template-columns: 1fr;
      place-items: center;
      text-align: center;
    }

    .slide-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      text-align: left;
    }

    .slide-line {
      font-size: clamp(10px, 2.3vw, 22px);
      font-weight: 850;
      color: var(--color-text-main);
      line-height: 1.45;
      margin: 2% 0;
    }

    .slide-line:first-child {
      color: rgba(7, 27, 70, 0.65);
      font-weight: 760;
    }

    .slide-line.emph {
      color: var(--color-text-main);
      position: relative;
      display: inline-block;
    }

    .slide-line.emph::after {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      bottom: 2px;
      height: 32%;
      border-radius: 99px;
      background: linear-gradient(90deg, rgba(255, 184, 77, 0.45), rgba(255, 107, 99, 0.2));
      z-index: -1;
    }

    .slide-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide-stage {
      position: relative;
      width: 100%;
      height: 90%;
      display: grid;
      place-items: center;
    }

    .slide-img {
      max-width: 100%;
      max-height: 85%;
      object-fit: contain;
      border-radius: 43% 57% 49% 51% / 45% 45% 55% 55%;
      filter: drop-shadow(0 14px 22px rgba(7, 27, 70, 0.1));
    }

    .final-logo-img {
      max-height: 55%;
      border-radius: 0;
      filter: drop-shadow(0 8px 16px rgba(7, 27, 70, 0.08));
    }

    .slide-light {
      position: absolute;
      border-radius: 50%;
      width: 50%;
      height: 50%;
      filter: blur(8px);
      opacity: 0.4;
      pointer-events: none;
    }

    .slide-light.l1 {
      left: 10%;
      top: 10%;
      background: rgba(255, 184, 77, 0.35);
    }

    .slide-light.l2 {
      right: 10%;
      bottom: 10%;
      background: rgba(16, 41, 95, 0.15);
    }

    .slide-thread {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 18%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255, 184, 77, 0.7), rgba(255, 107, 99, 0.3), transparent);
    }

    .slide-signature {
      position: absolute;
      right: 4.5%;
      bottom: 4%;
      z-index: 9;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.4vw;
      padding-top: 0.6vw;
      border-top: 1.5px solid rgba(255, 184, 77, 0.6);
      text-shadow: 0 4px 12px rgba(7, 27, 70, 0.04);
    }

    .slide-signature span {
      display: block;
    }

    .slide-signature span:first-child {
      font-size: clamp(6px, 1.1vw, 10px);
      font-weight: 900;
      color: var(--color-primary);
      letter-spacing: 0.08em;
      margin-bottom: 1px;
    }

    .slide-signature span:last-child {
      font-size: clamp(4px, 0.8vw, 7px);
      font-weight: 500;
      color: rgba(7, 27, 70, 0.55);
      letter-spacing: 0.04em;
    }

    /* Modal / JSON Export Panel */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 27, 70, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      place-items: center;
      z-index: 100;
    }

    .modal {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 750px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(7, 27, 70, 0.2);
    }

    .modal-header {
      padding: 20px 24px;
      background: var(--color-primary);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 900;
    }

    .close-modal {
      font-size: 24px;
      cursor: pointer;
      color: white;
      opacity: 0.7;
      transition: 0.2s;
    }

    .close-modal:hover {
      opacity: 1;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 18px 24px;
      border-top: 1px solid var(--color-glass-border);
      background: #fcfdfd;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .json-textarea {
      width: 100%;
      height: 380px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--color-glass-border);
      background: #FAFBFB;
      color: #333;
      resize: none;
    }

    /* Notifications Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #001B45;
      color: white;
      padding: 16px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-left: 5px solid var(--color-accent);
    }

    .toast.error {
      border-left: 5px solid var(--color-coral);
    }

    /* Drag and Drop styling */
    .line-row.dragging {
      opacity: 0.45;
      border: 1.5px dashed var(--color-primary) !important;
      background: #eef3f3 !important;
    }
    .line-row.drag-over {
      border-top: 3px solid var(--color-accent) !important;
    }
    .drag-handle:hover {
      background-color: rgba(7, 27, 70, 0.05);
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="brand">
      <img src="assets/logo.png" alt="願意學 logo">
      <h1>故事簡報幕數編輯器</h1>
    </div>
    <div class="actions-top">
      <button class="btn btn-secondary" onclick="openImportModal()">📥 導入 JSON</button>
      <button class="btn btn-secondary" onclick="openExportModal()">📤 複製/導出 JSON</button>
      <button class="btn btn-primary" onclick="saveLocally()">💾 本機存檔並重構網頁 (Rebuild)</button>
    </div>
  </header>

  <!-- App Container -->
  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-title">
        <span>幕數清單 (${scenes.length}幕)</span>
      </div>
      <ul class="scenes-list" id="scenes-list">
        <!-- Javascript populated -->
      </ul>
    </div>

    <!-- Workspace -->
    <div class="workspace">
      <div class="workspace-section">
        <div class="section-title">
          <span id="current-scene-header">第 1 幕：編輯中</span>
          <span style="font-size:12px; font-weight:normal; color:rgba(7,27,70,0.5);" id="current-scene-img-display">scene01-illustration.png</span>
        </div>

        <div class="form-group">
          <label for="scene-title-input">幕數標題 (僅供參考/管理)</label>
          <input type="text" id="scene-title-input" class="form-control" oninput="updateCurrentSceneData()">
        </div>

        <div class="form-group">
          <label style="display:flex; justify-content:space-between; align-items:center;">
            <span>內容文字 (每行獨立顯示)</span>
            <button class="btn-icon" onclick="addLine()" title="新增一行 text" style="width:24px; height:24px; font-size:12px;">+</button>
          </label>
          <div class="lines-container" id="lines-container">
            <!-- Dynamic lines inputs -->
          </div>
        </div>
      </div>

      <div class="workspace-section">
        <div class="section-title">
          <span>視覺與配圖設定</span>
        </div>

        <div class="form-group">
          <label for="scene-img-input">配圖檔名 (位於 assets/ 資料夾中，如 scene01-illustration.png)</label>
          <input type="text" id="scene-img-input" class="form-control" oninput="updateCurrentSceneData()">
        </div>

        <div class="form-group">
          <label for="scene-fallback-input">後備配圖檔名 (當主圖不存在時使用，如 parent_anxiety.png)</label>
          <input type="text" id="scene-fallback-input" class="form-control" oninput="updateCurrentSceneData()">
        </div>

        <div class="form-group">
          <label for="scene-alt-input">圖片 alt 替代文字 (SEO 與無障礙說明)</label>
          <input type="text" id="scene-alt-input" class="form-control" oninput="updateCurrentSceneData()">
        </div>
      </div>
    </div>

    <!-- Live Preview Panel -->
    <div class="preview-panel">
      <div class="preview-header">
        <span class="preview-title">💻 網頁畫面模擬預覽 (即時同步)</span>
        <span style="font-size:12px; color:rgba(7,27,70,0.5);">16:9 比例縮放效果</span>
      </div>

      <div class="slide-wrapper">
        <div class="slide-container" id="slide-container">
          <div class="slide-layout" id="slide-layout">
            <div class="slide-copy" id="slide-copy">
              <!-- Lines populated in real-time -->
            </div>
            <div class="slide-visual" id="slide-visual">
              <!-- Image stage populated in real-time -->
            </div>
          </div>
          <div class="slide-signature">
            <img src="assets/slogan_child_math.png" class="sig-first" style="height: clamp(15px, 2.2vw, 28px); display: block;" alt="先懂孩子，再懂數學">
            <img src="assets/slogan_ai_coach.png" class="sig-second" style="height: clamp(11px, 1.6vw, 20px); display: block;" alt="AI時代的自學教練">
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div class="modal-overlay" id="export-modal" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>導出幕數 JSON 配置</h3>
        <span class="close-modal" onclick="closeExportModal()">&times;</span>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: 12px; font-size:14px; color: #555;">
          這是目前您編輯完成的所有幕數的完整 JSON 配置。請點選下方複製，然後在與 AI 助理的對話中，<b>貼上這段 JSON 內容給 AI 助理</b>，AI 將能自動為您重新建置正式網頁！
        </p>
        <textarea id="export-textarea" class="json-textarea" readonly></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="downloadJsonFile()">💾 下載 scenes-data.json</button>
        <button class="btn btn-primary" onclick="copyJsonToClipboard()">📋 複製到剪貼簿</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="import-modal" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>導入幕數 JSON 配置</h3>
        <span class="close-modal" onclick="closeImportModal()">&times;</span>
      </div>
      <div class="modal-body">
        <p style="margin-bottom: 12px; font-size:14px; color: #555;">
          請在下方文字框中貼入您的幕數 JSON 配置資料，然後點選「確認載入」：
        </p>
        <textarea id="import-textarea" class="json-textarea" placeholder="在此處貼入 JSON..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeImportModal()">取消</button>
        <button class="btn btn-primary" onclick="importJsonData()">✅ 確認載入</button>
      </div>
    </div>
  </div>

  <!-- Toast Toast -->
  <div class="toast" id="toast">
    <span id="toast-text"></span>
  </div>

  <!-- Default data fallback if server fails to load -->
  <script>
    const fallbackScenesData = [
      {
            "n": 1,
            "title": "你是否也常聽人說",
            "lines": [
                  {
                        "text": "你是否也聽過",
                        "size": "18px",
                        "color": ""
                  },
                  "「一代不如一代？」"
            ],
            "img": "scene01-illustration.png",
            "fallback": "parent_anxiety.png",
            "alt": "家長聽見孩子一代不如一代的焦慮"
      },
      {
            "n": 2,
            "title": "我並不這麼認為",
            "lines": [
                  "但",
                  "我並不這麼認為"
            ],
            "img": "scene02-illustration.png",
            "fallback": "parent_anxiety.png",
            "alt": "家長換一個角度理解孩子"
      },
      {
            "n": 3,
            "title": "正確的開啟方式",
            "lines": [
                  {

    let scenes = [...fallbackScenesData];
    let currentIndex = 0;

    // Load dynamic data from server if available
    async function fetchScenesData() {
      try {
        const response = await fetch('/api/scenes-data');
        if (response.ok) {
          const data = await response.json();
          if (Array.isArray(data) && data.length > 0) {
            scenes = data;
            showToast('已成功從伺服器載入最新幕數配置！', 'success');
          }
        }
      } catch (err) {
        console.warn('API /api/scenes-data is not available, using local preloaded fallback config.', err);
      }
      initApp();
    }

    // Initialize App
    function initApp() {
      renderScenesList();
      loadScene(currentIndex);
    }

    // Render Scenes List in Sidebar
    function renderScenesList() {
      const listContainer = document.getElementById('scenes-list');
      const countHeader = document.querySelector('.sidebar-title span');
      if (countHeader) countHeader.innerText = `幕數清單 (${scenes.length}幕)`;
      listContainer.innerHTML = '';
      
      scenes.forEach((scene, index) => {
        const li = document.createElement('li');
        li.className = `scene-item ${index === currentIndex ? 'active' : ''}`;
        li.onclick = () => loadScene(index);
        
        li.innerHTML = `
          <div class="scene-num">${scene.n}</div>
          <div class="scene-label">${scene.title}</div>
        `;
        listContainer.appendChild(li);
      });
    }

    // Load Selected Scene into Editor and Preview
    function loadScene(index) {
      currentIndex = index;
      const scene = scenes[currentIndex];
      
      // Highlight in list
      const items = document.querySelectorAll('.scene-item');
      items.forEach((item, idx) => {
        if (idx === index) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });

      // Update Form Headers
      document.getElementById('current-scene-header').innerText = `第 ${scene.n} 幕：編輯中`;
      document.getElementById('current-scene-img-display').innerText = scene.img;

      // Populate Form Fields
      document.getElementById('scene-title-input').value = scene.title || '';
      document.getElementById('scene-img-input').value = scene.img || '';
      document.getElementById('scene-fallback-input').value = scene.fallback || '';
      document.getElementById('scene-alt-input').value = scene.alt || '';

      // Populate Lines Container
      renderLinesInputs(scene.lines || []);
      
      // Update Live Preview
      updateLivePreview();
    }

    // Render text lines inputs
    function renderLinesInputs(lines) {
      const container = document.getElementById('lines-container');
      container.innerHTML = '';
      
      lines.forEach((line, index) => {
        const isObj = typeof line === 'object' && line !== null;
        const text = isObj ? (line.text || '') : line;
        const size = isObj ? (line.size || '') : '';
        const color = isObj ? (line.color || '#001B45') : '#001B45';
        
        const row = document.createElement('div');
        row.className = 'line-row';
        row.setAttribute('data-index', index);
        row.setAttribute('draggable', 'false');
        
        // Drag events
        row.ondragstart = (e) => handleDragStart(e, index);
        row.ondragover = (e) => handleDragOver(e, index);
        row.ondragleave = (e) => handleDragLeave(e, index);
        row.ondrop = (e) => handleDrop(e, index);
        row.ondragend = (e) => handleDragEnd(e);
        
        row.innerHTML = `
          <div class="drag-handle" onmousedown="enableRowDrag(event)" onmouseup="disableRowDrag(event)" style="cursor: grab; padding: 6px; color: rgba(7,27,70,0.3); font-size:16px; user-select: none; display: flex; align-items: center;" title="拖曳以排序">⠿</div>
          <span style="font-size:12px; font-weight:bold; color:rgba(7,27,70,0.4); width:20px; flex-shrink:0; text-align: center;">#${index+1}</span>
          <input type="text" class="form-control line-input" value="${text.replace(/"/g, '&quot;')}" oninput="updateCurrentSceneData()" placeholder="內容文字..." style="flex:1;">
          
          <select class="form-control line-size-select" onchange="setLineSize(${index}, this.value)" style="width: 105px; flex-shrink: 0; padding: 6px 4px; font-size:11px; height: 36px;">
            <option value="" ${size === '' ? 'selected' : ''}>字型: 預設</option>
            <option value="12px" ${size === '12px' ? 'selected' : ''}>12px (極微小)</option>
            <option value="14px" ${size === '14px' ? 'selected' : ''}>14px (微小)</option>
            <option value="16px" ${size === '16px' ? 'selected' : ''}>16px (較小)</option>
            <option value="18px" ${size === '18px' ? 'selected' : ''}>18px (偏小)</option>
            <option value="22px" ${size === '22px' ? 'selected' : ''}>22px (中等偏小)</option>
            <option value="26px" ${size === '26px' ? 'selected' : ''}>26px (中等)</option>
            <option value="30px" ${size === '30px' ? 'selected' : ''}>30px (中等偏大)</option>
            <option value="34px" ${size === '34px' ? 'selected' : ''}>34px (推薦大標)</option>
            <option value="38px" ${size === '38px' ? 'selected' : ''}>38px (較大)</option>
            <option value="42px" ${size === '42px' ? 'selected' : ''}>42px (大)</option>
            <option value="46px" ${size === '46px' ? 'selected' : ''}>46px (特大)</option>
          </select>
          
          <div class="color-swatches" style="display:flex; gap:5px; align-items:center; flex-shrink:0; background: rgba(16,41,95,0.03); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--color-glass-border);">
            ${buildColorSwatches(color === '#001B45' || color === '' ? '#001B45' : color, index)}
          </div>
          
          <button class="btn-icon" onclick="insertLine(${index})" title="在此行下方插入新行" style="width:30px; height:30px; font-size:12px;">➕</button>
          <button class="btn-icon remove" onclick="removeLine(${index})" title="刪除此行">🗑️</button>
        `;
        container.appendChild(row);
      });
    }

    // Helper to build Preset Swatches + Color Picker
    function buildColorSwatches(currentColor, lineIndex) {
      const presets = [
        { value: '#001B45', label: '預設深藍' },
        { value: '#5B6D8D', label: '首行灰藍' },
        { value: '#FFAF65', label: '品牌暖橘' }
      ];
      
      let html = '';
      let matchesPreset = presets.some(p => p.value.toLowerCase() === currentColor.toLowerCase());
      
      presets.forEach(preset => {
        const isActive = preset.value.toLowerCase() === currentColor.toLowerCase();
        const activeStyle = isActive ? 'border: 2.5px solid #000; transform: scale(1.25); box-shadow: 0 0 6px rgba(0,0,0,0.2);' : 'border: 1px solid rgba(7,27,70,0.15);';
        html += `<button type="button" onclick="setLineColor(${lineIndex}, '${preset.value}')" title="${preset.label}" style="width:18px; height:18px; border-radius:50%; background-color:${preset.value}; cursor:pointer; padding:0; ${activeStyle} transition: transform 0.2s;"></button>`;
      });
      
      // Custom picker
      const customColor = matchesPreset ? '#001B45' : currentColor;
      const customActiveStyle = !matchesPreset && currentColor ? 'border: 2.5px solid #000; transform: scale(1.25); box-shadow: 0 0 6px rgba(0,0,0,0.2);' : 'border: 1px solid rgba(7,27,70,0.15);';
      
      html += `
        <div style="position:relative; width:18px; height:18px; border-radius:50%; overflow:hidden; ${customActiveStyle} cursor:pointer; background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);" title="自訂顏色">
          <input type="color" class="line-color-picker" value="${customColor}" oninput="setLineCustomColor(${lineIndex}, this.value)" onchange="saveCustomColor(${lineIndex}, this.value)" style="position:absolute; top:-4px; left:-4px; width:26px; height:26px; border:none; padding:0; cursor:pointer; opacity: 0;">
        </div>
      `;
      
      return html;
    }

    // Set swatch colors
    function setLineColor(lineIndex, color) {
      const scene = scenes[currentIndex];
      const line = scene.lines[lineIndex];
      const isObj = typeof line === 'object' && line !== null;
      const text = isObj ? (line.text || '') : line;
      const size = isObj ? (line.size || '') : '';
      
      if (size === '' && (color === '#001B45' || color === '#071B46')) {
        scene.lines[lineIndex] = text;
      } else {
        scene.lines[lineIndex] = { text, size, color: (color === '#001B45' || color === '#071B46') ? '' : color };
      }
      
      renderLinesInputs(scene.lines);
      updateLivePreview();
    }

    // Set line font size directly
    function setLineSize(lineIndex, size) {
      const scene = scenes[currentIndex];
      const line = scene.lines[lineIndex];
      const isObj = typeof line === 'object' && line !== null;
      const text = isObj ? (line.text || '') : line;
      const color = isObj ? (line.color || '') : '';
      
      if (size === '' && (color === '' || color === '#001B45' || color === '#071B46')) {
        scene.lines[lineIndex] = text;
      } else {
        scene.lines[lineIndex] = { text, size, color: (color === '#001B45' || color === '#071B46') ? '' : color };
      }
      
      renderLinesInputs(scene.lines);
      updateLivePreview();
    }

    // Custom color slider updates in real-time
    function setLineCustomColor(lineIndex, color) {
      const scene = scenes[currentIndex];
      const line = scene.lines[lineIndex];
      const isObj = typeof line === 'object' && line !== null;
      const text = isObj ? (line.text || '') : line;
      const size = isObj ? (line.size || '') : '';
      
      scene.lines[lineIndex] = { text, size, color };

      const previewLines = document.querySelectorAll('#slide-copy .slide-line');
      if (previewLines[lineIndex]) {
        previewLines[lineIndex].style.color = color;
        const emphSpan = previewLines[lineIndex].querySelector('.emph');
        if (emphSpan) emphSpan.style.color = color;
      }
    }

    // Custom color slider save on release
    function saveCustomColor(lineIndex, color) {
      const scene = scenes[currentIndex];
      const line = scene.lines[lineIndex];
      const isObj = typeof line === 'object' && line !== null;
      const text = isObj ? (line.text || '') : line;
      const size = isObj ? (line.size || '') : '';
      
      scene.lines[lineIndex] = { text, size, color };
      renderLinesInputs(scene.lines);
    }

    // Drag control events
    let dragSourceIndex = null;

    // Enable/disable row dragging
    function enableRowDrag(e) {
      const row = e.target.closest('.line-row');
      if (row) row.setAttribute('draggable', 'true');
    }

    function disableRowDrag(e) {
      const row = e.target.closest('.line-row');
      if (row) row.setAttribute('draggable', 'false');
    }

    function handleDragStart(e, index) {
      dragSourceIndex = index;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', index);
    }

    function handleDragOver(e, index) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const row = document.querySelector(`.line-row[data-index="${index}"]`);
      if (row && dragSourceIndex !== index) {
        row.classList.add('drag-over');
      }
    }

    function handleDragLeave(e, index) {
      const row = document.querySelector(`.line-row[data-index="${index}"]`);
      if (row) row.classList.remove('drag-over');
    }

    function handleDrop(e, destIndex) {
      e.preventDefault();
      const rows = document.querySelectorAll('.line-row');
      rows.forEach(row => row.classList.remove('drag-over'));
      
      const sourceIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
      if (sourceIndex !== destIndex && !isNaN(sourceIndex)) {
        const scene = scenes[currentIndex];
        const [movedLine] = scene.lines.splice(sourceIndex, 1);
        scene.lines.splice(destIndex, 0, movedLine);
        loadScene(currentIndex);
      }
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      e.target.setAttribute('draggable', 'false');
      const rows = document.querySelectorAll('.line-row');
      rows.forEach(row => {
        row.classList.remove('drag-over');
        row.classList.remove('dragging');
      });
    }

    // Insert line at specific position
    function insertLine(lineIndex) {
      const scene = scenes[currentIndex];
      if (!scene.lines) scene.lines = [];
      scene.lines.splice(lineIndex + 1, 0, '');
      loadScene(currentIndex);
    }

    // Add new line for current scene (to the end)
    function addLine() {
      const scene = scenes[currentIndex];
      if (!scene.lines) scene.lines = [];
      scene.lines.push('');
      loadScene(currentIndex);
    }

    // Remove a line
    function removeLine(lineIndex) {
      const scene = scenes[currentIndex];
      if (scene.lines && scene.lines.length > 1) {
        scene.lines.splice(lineIndex, 1);
        loadScene(currentIndex);
      } else {
        showToast('每幕至少需要保留一行文字內容！', 'error');
      }
    }

    // Capture editor values and update memory dataset
    function updateCurrentSceneData() {
      const scene = scenes[currentIndex];
      
      scene.title = document.getElementById('scene-title-input').value;
      scene.img = document.getElementById('scene-img-input').value;
      scene.fallback = document.getElementById('scene-fallback-input').value;
      scene.alt = document.getElementById('scene-alt-input').value;
      
      // Update only the text field of each line, keeping size & color
      const inputs = document.querySelectorAll('.line-input');
      inputs.forEach((input, index) => {
        const text = input.value;
        const currentLine = scene.lines[index];
        
        if (typeof currentLine === 'object' && currentLine !== null) {
          currentLine.text = text;
        } else {
          scene.lines[index] = text;
        }
      });

      // Sync header image filename label
      document.getElementById('current-scene-img-display').innerText = scene.img;

      // Update sidebar title immediately
      const activeLabel = document.querySelector('.scene-item.active .scene-label');
      if (activeLabel) {
        activeLabel.innerText = scene.title || '（無標題）';
      }

      // Sync preview
      updateLivePreview();
    }

    // Render Slide Preview Mockup
    function updateLivePreview() {
      const scene = scenes[currentIndex];
      const copyContainer = document.getElementById('slide-copy');
      const visualContainer = document.getElementById('slide-visual');
      const layoutContainer = document.getElementById('slide-layout');
      const slideContainer = document.getElementById('slide-container');

      // Clear layout classes
      slideContainer.className = 'slide-container';
      
      // Generate Copy
      copyContainer.innerHTML = '';
      
      if (scene.n === scenes.length) {
        // Special layout for final LOGO scene
        layoutContainer.className = 'slide-layout final-logo-layout';
        
        // Final logo layout doesn't use copy container, it just shows logo
        visualContainer.innerHTML = `
          <div class="slide-stage" style="height: 100%;">
            <img src="assets/${scene.img}" class="slide-img final-logo-img" alt="${scene.alt}" onerror="this.src='assets/${scene.fallback}'">
          </div>
        `;
        return;
      }

      // Normal scene layout
      layoutContainer.className = 'slide-layout';
      
      // Add lines
      (scene.lines || []).forEach((line, index) => {
        const isObj = typeof line === 'object' && line !== null;
        const text = isObj ? (line.text || '') : line;
        const size = isObj ? (line.size || '') : '';
        const color = isObj ? (line.color || '') : '';
        
        const p = document.createElement('p');
        p.className = 'slide-line';
        
        if (size) p.style.fontSize = size;
        if (color) p.style.color = color;
        
        // Highlight last line in scene
        if (index === scene.lines.length - 1) {
          const emphStyle = color ? ` style="color: ${color} !important;"` : '';
          p.innerHTML = `<span class="emph"${emphStyle}>${text}</span>`;
        } else {
          p.innerText = text;
        }
        copyContainer.appendChild(p);
      });

      // Generate Visual
      visualContainer.innerHTML = `
        <div class="slide-stage">
          <span class="slide-light l1"></span>
          <span class="slide-light l2"></span>
          <img src="assets/${scene.img}" class="slide-img" alt="${scene.alt}" onerror="this.src='assets/${scene.fallback}'">
          <span class="slide-thread"></span>
        </div>
      `;
    }

    // Modal Operations
    function openExportModal() {
      const json = JSON.stringify(scenes, null, 2);
      document.getElementById('export-textarea').value = json;
      document.getElementById('export-modal').style.display = 'grid';
    }

    function closeExportModal() {
      document.getElementById('export-modal').style.display = 'none';
    }

    function openImportModal() {
      document.getElementById('import-textarea').value = '';
      document.getElementById('import-modal').style.display = 'grid';
    }

    function closeImportModal() {
      document.getElementById('import-modal').style.display = 'none';
    }

    function closeModalOnOverlay(e) {
      if (e.target.classList.contains('modal-overlay')) {
        e.target.style.display = 'none';
      }
    }

    // Copy JSON to clipboard
    function copyJsonToClipboard() {
      const textarea = document.getElementById('export-textarea');
      textarea.select();
      document.execCommand('copy');
      showToast('🎉 JSON 配置已成功複製到您的剪貼簿！', 'success');
      closeExportModal();
    }

    // Download JSON as a file
    function downloadJsonFile() {
      const jsonStr = JSON.stringify(scenes, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(jsonStr);
      
      const exportFileDefaultName = 'scenes-data.json';
      
      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
      showToast('📥 scenes-data.json 已開始下載！', 'success');
    }

    // Import user JSON payload
    function importJsonData() {
      const text = document.getElementById('import-textarea').value.trim();
      if (!text) {
        showToast('請先貼入 JSON 資料！', 'error');
        return;
      }

      try {
        const parsed = JSON.parse(text);
        if (Array.isArray(parsed) && parsed.length > 0) {
          scenes = parsed;
          currentIndex = 0;
          initApp();
          showToast('✅ JSON 資料成功載入！', 'success');
          closeImportModal();
        } else {
          showToast('JSON 格式不符 (必須是包含幕數物件的陣列)！', 'error');
        }
      } catch (e) {
        showToast('JSON 解析錯誤，請檢查貼入的格式是否正確！', 'error');
      }
    }

    // Save configuration locally via API
    async function saveLocally() {
      showToast('💾 正在儲存至伺服器並重構網頁，請稍候...', 'success');
      
      try {
        const response = await fetch('/api/scenes-data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(scenes)
        });

        if (response.ok) {
          const result = await response.json();
          if (result.ok) {
            if (result.rebuilt) {
              showToast('✨ 存檔成功！網頁檔案已重構完成，即時更新！', 'success');
            } else {
              showToast('💾 存檔成功！但伺服器端重構時發生錯誤：' + (result.error || ''), 'error');
            }
          } else {
            showToast('❌ 存檔失敗：' + (result.error || '未知的錯誤'), 'error');
          }
        } else {
          showToast('❌ 無法與伺服器通訊，請確保您是在本機啟動 `node server.js` 運作此網頁。', 'error');
        }
      } catch (err) {
        console.error(err);
        showToast('❌ 存檔時連線失敗。若您直接開啟靜態 HTML，請使用「複製/導出 JSON」提供給 AI 助理。', 'error');
      }
    }

    // Show Toast notifications
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const textSpan = document.getElementById('toast-text');
      
      toast.className = `toast show ${type}`;
      textSpan.innerText = message;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 4500);
    }

    // Start App
    window.onload = fetchScenesData;
  </script>
</body>
</html>
